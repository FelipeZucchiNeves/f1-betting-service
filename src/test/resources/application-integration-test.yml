# Integration Test Configuration
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  cache:
    type: caffeine

# OpenF1 API Configuration (will be mocked)
openf1:
  api:
    base-url: https://api.openf1.org/v1

# Logging
logging:
  level:
    root: WARN
    com.f1betting: DEBUG
    org.testcontainers: INFO
    org.flywaydb: INFO
